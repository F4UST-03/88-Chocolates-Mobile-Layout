<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile Card - Mobile</title>
  <style>
    :root{
      --bg: #f6f0e9;
      --card: #ffffff;
      --border: #6b4a2d;
      --text: #2b1a0f;
      --muted: #7a5a3a;
      --btn-blue: #5a4bd8;
      --btn-red: #c23a3a;
      --shadow: 0 6px 18px rgba(0,0,0,.08);
      --radius: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
    }

    /* Top bar mimicking the screenshot (Profile title & avatar icon) */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: #3d1f0f; /* dark brown like screenshot */
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar .brand {
      font-weight: 700;
      letter-spacing: .2px;
    }
    .topbar .icon-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    /* Layout container to center content and mimic white card with rounded borders inside a frame */
    .container {
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px 20px 28px;
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
    }

    /* Avatar area with circular ring and a small edit button overlaying the circle */
    .avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 6px 6px 4px;
    }

    .avatar-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 6px solid #3d1f0f;
      display: grid;
      place-items: center;
      background: #fff;
      position: relative;
    }

    /* Simple user icon inside the circle (SVG) */
    .avatar-icon {
      width: 60px; height: 60px;
      fill: #3d1f0f;
    }

    /* small edit button on the avatar – circular gray button with a pencil icon */
    .edit-btn {
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #6b6f73;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      cursor: pointer;
    }
    .edit-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* Form groups */
    .form-row {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lbl {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 14px 14px;
      border-radius: 24px;
      border: 2px solid #d9c6b3;
      outline: none;
      font-size: 15px;
      background: #fff;
      color: var(--text);
    }

    input::placeholder {
      color: #a1866a;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-blue {
      background: var(--btn-blue);
      color: #fff;
      margin-top: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
    }

    .btn-red {
      background: var(--btn-red);
      color: #fff;
      margin-top: 12px;
    }

    /* Accessibility focus */
    input:focus, .btn:focus, .edit-btn:focus {
      outline: 3px solid #ffd08a;
      outline-offset: 0;
    }

    /* Small screens adjust typography and spacing a bit */
    @media (max-width: 420px){
      .avatar-circle { width: 110px; height: 110px; }
      .card { padding: 18px 14px; }
      .lbl { font-size: 13.5px; }
      input { font-size: 14px; padding: 12px 12px; }
    }

    /* Optional: ensure comfortable tap targets on dense mobile */
    .btn, .edit-btn {
      touch-action: manipulation;
    }
  </style>
</head>
<body>

  <header class="topbar" aria-label="Top bar">
    <div class="brand">Profile</div>
    <div class="avatar-icon" aria-hidden="true" style="width:28px;height:28px;background:#fff;border-radius:50%;display:inline-block;position:relative;">
      <!-- simple placeholder circle to resemble the header icon on the right -->
    </div>
  </header>

  <main class="container" aria-label="Profile content">
    <section class="card" aria-label="Profile card">
      <div class="avatar-wrap" style="position: relative;">
        <div class="avatar-circle" aria-label="User avatar">
          <!-- Simple user-like silhouette (SVG) -->
          <svg class="avatar-icon" viewBox="0 0 64 64" aria-label="User">
            <circle cx="32" cy="20" r="12" fill="none" stroke="#3d1f0f" stroke-width="4"/>
            <path d="M12 52c0-9.9 8.1-18 18-18s18 8.1 18 18" fill="none" stroke="#3d1f0f" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <button class="edit-btn" aria-label="Edit profile picture">
          <!-- pencil icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 21l3-1 12-12-2-2-12 12-1 3z"/>
            <path d="M14 4l2 2"/>
            <path d="M3 21l6-2"/>
          </svg>
        </button>
      </div>

      <div class="form-row" style="margin-top:6px;">
        <label class="lbl" for="storeName">Store Name:</label>
        <input id="storeName" type="text" placeholder="88 Chocolates & More" />
      </div>

      <div class="form-row">
        <label class="lbl" for="username">Username:</label>
        <input id="username" type="text" placeholder="user.user" />
      </div>

      <div class="form-row">
        <label class="lbl" for="email">E-mail:</label>
        <input id="email" type="email" placeholder="user@example.com" />
      </div>

      <button class="btn btn-blue" type="button" aria-label="Change Password">
        Change Password
      </button>

      <button class="btn btn-red" type="button" aria-label="Log out">
        Log out
      </button>
    </section>
  </main>

</body>
</html>
